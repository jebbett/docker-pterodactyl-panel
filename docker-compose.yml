version: "3.4"
services:
  database:
    image: mariadb
    restart: always
    environment:
      MYSQL_DATABASE: panel
      MYSQL_USER: pterodactyl
      MYSQL_PASSWORD: changethispassword
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
    volumes:
      - db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
  cache:
    image: redis
    restart: always
  php-fpm:
    build:
      context: https://github.com/jebbett/pterodactyl-panel-docker.git#main
      dockerfile: Dockerfile
    image: jebbett/pterodactyl-panel:v1.14.0
    restart: always
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_started
    volumes:
      - app:/var/www/html/
      - storage:/var/www/html/storage/
      - public:/var/www/html/public/
    environment:
      DB_HOST: database
      DB_PORT: 3306
      DB_DATABASE: panel
      DB_USERNAME: pterodactyl
      DB_PASSWORD: changethispasswordtothesameasabove
      REDIS_HOST: cache
      REDIS_PORT: 6379
  nginx:
    image: yoshiwalsh/nginx-for-php-fpm
    restart: always
    depends_on:
      - php-fpm
    ports:
      - 5080:80
    volumes:
      - public:/var/www/html/

volumes:
  public:
  db:
  storage:
  app:
